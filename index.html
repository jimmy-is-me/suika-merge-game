<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wuwu Drink Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
  <style>
    :root {
      --pink:   #e8527a;
      --orange: #ff8c42;
      --gold:   #f7b731;
      --green:  #26d07c;
      --text:   #1e1624;
      --muted:  #8a7f90;
      --bg:     #faf5fb;
      --surf:   rgba(255,255,255,0.88);
      --surf2:  rgba(255,255,255,0.96);
      --border: rgba(232,82,122,0.12);
      --cup-bg: #fff9fd;
      --radius: 22px;
      --shadow: 0 16px 48px rgba(180,60,110,0.13);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: 'Nunito', system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(ellipse 120% 80% at 60% 10%, #ffe4f0 0%, #faf5fb 50%, #eef4ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app-outer {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app {
      display: flex;
      width: 100%;
      max-width: 980px;
      height: calc(100vh - 24px);
      max-height: 760px;
      gap: 12px;
      padding: 0 16px;
    }

    .panel {
      background: var(--surf);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: var(--radius);
    }

    .sidebar {
      flex: 0 0 230px;
      height: 100%;
      padding: 18px 16px;
      display: flex; flex-direction: column; gap: 12px;
      overflow-y: auto;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .board-wrap {
      flex: 1 1 0;
      height: 100%;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }
    .board-shell {
      position: relative;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      height: 100%;
      width: auto;
      max-width: 100%;
      border-radius: 24px;
      border: 1.5px solid rgba(232,82,122,0.14);
      background: var(--cup-bg);
      cursor: crosshair;
      touch-action: none;
      box-shadow:
        0 8px 32px rgba(180,60,110,0.10) inset,
        0 2px 0 rgba(255,255,255,0.9) inset,
        0 24px 64px rgba(180,60,110,0.18);
    }

    /* Logo */
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-bubble {
      width: 42px; height: 42px; border-radius: 14px; flex: 0 0 auto;
      background: linear-gradient(135deg, var(--pink), var(--orange));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 6px 18px rgba(232,82,122,0.35);
    }
    .logo-info { line-height: 1; }
    .logo-name {
      font-size: 15px; font-weight: 900; letter-spacing: -.3px;
      background: linear-gradient(90deg, var(--pink), var(--orange));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo-sub { font-size: 10.5px; color: var(--muted); margin-top: 2px; font-weight: 600; }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(232,82,122,0.18), transparent);
      flex-shrink: 0;
    }

    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat {
      padding: 10px 12px; border-radius: 16px;
      background: linear-gradient(135deg, #fff0f6 0%, #fff8f0 100%);
      border: 1px solid rgba(232,82,122,0.10);
      position: relative; overflow: hidden;
    }
    .stat::before {
      content: ''; position: absolute; top: -12px; right: -12px;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--clr, rgba(232,82,122,0.07));
    }
    .stat[data-clr="pink"]  { --clr: rgba(232,82,122,0.10); }
    .stat[data-clr="green"] { --clr: rgba(38,208,124,0.10); }
    .stat[data-clr="blue"]  { --clr: rgba(80,120,255,0.08); }
    .stat[data-clr="gold"]  { --clr: rgba(247,183,49,0.12); }
    .stat-label { font-size: 9.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .stat-value {
      font-size: 24px; font-weight: 900; line-height: 1.1; margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }
    .stat-value.pink  { color: var(--pink); }
    .stat-value.green { color: var(--green); }
    .stat-value.blue  { color: #5078ff; }
    .stat-value.gold  { color: var(--gold); }

    .next-card {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: 16px;
      background: linear-gradient(135deg, #fff0f6, #fff8f0);
      border: 1px solid rgba(232,82,122,0.10);
    }
    .next-ring {
      width: 52px; height: 52px; flex: 0 0 auto; border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--pink), var(--orange));
      box-shadow: 0 4px 14px rgba(232,82,122,0.30);
    }
    .next-ring-inner { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; background: #fff; }
    .next-ring-inner img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .next-label { font-size: 9.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 2px; }
    .next-name  { font-size: 13px; font-weight: 900; }
    .next-hint  { font-size: 10.5px; color: var(--muted); font-weight: 600; }

    .btn {
      width: 100%; border: 0; cursor: pointer; border-radius: 14px;
      padding: 11px 16px; font-size: 13.5px; font-weight: 900;
      font-family: inherit;
      background: linear-gradient(135deg, var(--pink) 0%, var(--orange) 100%);
      color: #fff;
      box-shadow: 0 6px 20px rgba(232,82,122,0.32);
      transition: transform .14s ease, box-shadow .14s ease;
      letter-spacing: .02em;
      flex-shrink: 0;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(232,82,122,0.38); }
    .btn:active { transform: translateY(0); box-shadow: 0 4px 12px rgba(232,82,122,0.28); }

    .section-label { font-size: 9.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .09em; color: var(--muted); flex-shrink: 0; }
    .item-list { display: flex; flex-direction: column; gap: 2px; }
    .item-row {
      display: flex; align-items: center; gap: 9px;
      padding: 5px 8px; border-radius: 11px;
      transition: background .14s;
    }
    .item-row:hover { background: rgba(232,82,122,0.06); }
    .item-dot {
      width: 30px; height: 30px; border-radius: 50%; flex: 0 0 auto;
      overflow: hidden; border: 2px solid rgba(232,82,122,0.14);
      background: #fff5f9;
    }
    .item-dot img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .item-name { font-size: 12px; font-weight: 700; flex: 1; min-width: 0; }
    .item-badge {
      font-size: 10.5px; font-weight: 800; color: var(--pink);
      background: rgba(232,82,122,0.10);
      padding: 2px 8px; border-radius: 99px;
    }

    .tip {
      padding: 10px 12px; border-radius: 13px;
      background: rgba(247,183,49,0.08);
      border: 1px solid rgba(247,183,49,0.20);
      font-size: 11.5px; color: var(--muted); font-weight: 600;
      line-height: 1.55;
      flex-shrink: 0;
    }
    .tip span { color: var(--text); font-weight: 800; }

    /* ── Launcher at bottom ── */
    .launcher-token {
      position: absolute;
      bottom: 28px;
      border-radius: 50%;
      pointer-events: none;
      transform: translateX(-50%);
      overflow: hidden;
      background: #fff;
      z-index: 3;
      box-shadow:
        0 0 0 3px rgba(255,255,255,0.9),
        0 0 0 5px rgba(232,82,122,0.35),
        0 8px 24px rgba(232,82,122,0.40),
        0 0 18px rgba(232,82,122,0.25);
      transition: left .06s ease, width .18s ease, height .18s ease;
      animation: launcherPulse 2s ease-in-out infinite;
    }
    .launcher-token img { width: 100%; height: 100%; object-fit: cover; display: block; }
    @keyframes launcherPulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(255,255,255,0.9), 0 0 0 5px rgba(232,82,122,0.35), 0 8px 24px rgba(232,82,122,0.40), 0 0 18px rgba(232,82,122,0.25); }
      50%       { box-shadow: 0 0 0 3px rgba(255,255,255,0.9), 0 0 0 8px rgba(232,82,122,0.20), 0 8px 32px rgba(232,82,122,0.50), 0 0 28px rgba(232,82,122,0.35); }
    }

    /* shoot guide line going upward */
    .shoot-guide {
      position: absolute;
      bottom: 74px;
      top: 0;
      width: 2px;
      background: linear-gradient(0deg, rgba(232,82,122,0.50) 0%, rgba(232,82,122,0.08) 60%, transparent 100%);
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 2;
      transition: left .06s ease;
    }
    /* dashed overlay on the guide */
    .shoot-guide::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 6px,
        rgba(255,255,255,0.55) 6px,
        rgba(255,255,255,0.55) 10px
      );
    }

    /* Score pop */
    .score-pop {
      position: absolute; pointer-events: none; z-index: 10;
      font-size: 19px; font-weight: 900;
      font-family: 'Nunito', sans-serif;
      color: var(--pink);
      text-shadow: 0 2px 8px rgba(0,0,0,0.10);
      animation: floatUp .9s cubic-bezier(0.16,1,0.3,1) forwards;
      white-space: nowrap;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      50%  { opacity: 1; transform: translateY(-32px) scale(1.2); }
      100% { opacity: 0; transform: translateY(-56px) scale(0.9); }
    }

    /* Combo badge */
    .combo-badge {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, var(--pink), var(--orange));
      color: #fff; font-size: 12.5px; font-weight: 900;
      font-family: 'Nunito', sans-serif;
      padding: 5px 16px; border-radius: 99px;
      box-shadow: 0 6px 18px rgba(232,82,122,0.40);
      z-index: 9; pointer-events: none;
      animation: comboPop .38s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap; letter-spacing: .02em;
    }
    @keyframes comboPop {
      0%   { transform: translateX(-50%) scale(0.6); opacity: 0; }
      100% { transform: translateX(-50%) scale(1);   opacity: 1; }
    }

    /* Game over overlay */
    .overlay {
      position: absolute; inset: 0;
      display: none; align-items: center; justify-content: center; z-index: 8;
      backdrop-filter: blur(6px);
      border-radius: 24px;
    }
    .overlay.show { display: flex; }
    .overlay-card {
      width: min(340px, calc(100% - 32px));
      background: var(--surf2);
      border: 1.5px solid rgba(232,82,122,0.16);
      border-radius: 24px; padding: 28px 24px;
      box-shadow: 0 28px 64px rgba(180,60,110,0.22);
      text-align: center;
    }
    .ov-emoji { font-size: 52px; margin-bottom: 8px; display: block; }
    .ov-title { font-size: 24px; font-weight: 900; color: var(--pink); margin-bottom: 6px; }
    .ov-score { font-size: 52px; font-weight: 900; color: var(--text); line-height: 1; margin: 4px 0; }
    .ov-pts   { font-size: 13px; color: var(--muted); font-weight: 600; }
    .ov-best  { font-size: 13px; color: var(--muted); font-weight: 700; margin: 6px 0 20px; }
    .ov-btn {
      display: inline-block; border: 0; cursor: pointer; border-radius: 14px;
      padding: 12px 32px; font-size: 14px; font-weight: 900;
      font-family: inherit;
      background: linear-gradient(135deg, var(--pink), var(--orange));
      color: #fff;
      box-shadow: 0 8px 24px rgba(232,82,122,0.35);
      transition: transform .14s ease;
      letter-spacing: .02em;
    }
    .ov-btn:hover { transform: translateY(-2px); }
    .ov-btn:active { transform: translateY(0); }

    /* Mobile */
    @media (max-width: 640px) {
      html, body { height: auto; overflow: auto; min-height: 100%; }
      body { align-items: flex-start; }
      .app-outer { height: auto; align-items: flex-start; }
      .app {
        flex-direction: column;
        max-width: 100%; height: auto; max-height: none;
        gap: 10px; padding: 10px;
      }
      .sidebar { flex: none; width: 100%; height: auto; overflow-y: visible; }
      .board-wrap {
        flex: none; width: 100%;
        height: calc((100vw - 20px) * 682 / 462);
        max-height: 82vh; padding: 8px;
      }
      .board-shell { width: 100%; height: 100%; }
      canvas { width: 100%; height: 100%; max-width: none; }
    }
  </style>
</head>
<body>
<div class="app-outer">
<div class="app">
  <!-- Sidebar -->
  <aside class="panel sidebar">
    <div class="logo">
      <div class="logo-bubble">🍹</div>
      <div class="logo-info">
        <div class="logo-name">Wuwu Drink Game</div>
        <div class="logo-sub">射擊 · 合併 · 升級！</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat" data-clr="pink">
        <div class="stat-label">Score</div>
        <div class="stat-value pink" id="score">0</div>
      </div>
      <div class="stat" data-clr="green">
        <div class="stat-label">Best</div>
        <div class="stat-value green" id="best">0</div>
      </div>
      <div class="stat" data-clr="blue">
        <div class="stat-label">Merges</div>
        <div class="stat-value blue" id="merges">0</div>
      </div>
      <div class="stat" data-clr="gold">
        <div class="stat-label">Max Lv.</div>
        <div class="stat-value gold" id="maxlevel">1</div>
      </div>
    </div>

    <div class="next-card">
      <div class="next-ring">
        <div class="next-ring-inner"><img id="nextImg" alt="next"></div>
      </div>
      <div>
        <div class="next-label">Next</div>
        <div class="next-name" id="nextName">—</div>
        <div class="next-hint">⬆ 下一個射出</div>
      </div>
    </div>

    <button class="btn" id="restartBtn">🔄 重新開始</button>

    <div class="divider"></div>

    <div class="section-label">飲料合併表</div>
    <div class="item-list" id="itemList"></div>

    <div class="tip">
      <span>💡 小技巧：</span>瞄準同等級飲料射擊，連鎖合併得更高分！
    </div>
  </aside>

  <!-- Board -->
  <section class="panel board-wrap">
    <div class="board-shell" id="boardShell">

      <!-- launcher at bottom (replaces top preview) -->
      <div class="launcher-token" id="launcherToken"><img id="launcherImg" alt=""></div>
      <!-- shoot guide going upward -->
      <div class="shoot-guide" id="shootGuide"></div>

      <div class="overlay" id="gameOverOverlay">
        <div class="overlay-card">
          <span class="ov-emoji">😵</span>
          <div class="ov-title">杯子溢出了！</div>
          <div class="ov-pts">最終分數</div>
          <div class="ov-score" id="finalScore">0</div>
          <div class="ov-best" id="finalBest"></div>
          <button class="ov-btn" id="restartBtn2">🔄 再玩一次</button>
        </div>
      </div>

      <canvas id="game" width="462" height="682"></canvas>
    </div>
  </section>
</div>
</div>

<script>
/* ── Items ── */
const ITEMS = [

  { level:6, name:'傳說特調',   radius:90, score:880, image:'./assets/images/item-7.png' }

  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><circle cx="100" cy="100" r="96" fill="#e0fae8" stroke="#50c060" stroke-width="4"/><defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#70d880"/><stop offset="100%" stop-color="#30b840"/></linearGradient></defs><rect x="50" y="60" width="100" height="100" rx="20" fill="#f03050"/><ellipse cx="100" cy="60" rx="50" ry="20" fill="url(#wg)"/><ellipse cx="100" cy="46" rx="38" ry="22" fill="#b8efc0" opacity=".85"/><rect x="92" y="22" width="9" height="30" rx="4.5" fill="#20a030"/><circle cx="82" cy="95" r="5.5" fill="#180808"/><circle cx="100" cy="108" r="5.5" fill="#180808"/><circle cx="118" cy="95" r="5.5" fill="#180808"/><circle cx="88" cy="118" r="4.5" fill="#180808"/><circle cx="112" cy="118" r="4.5" fill="#180808"/><text x="100" y="178" font-family="Arial" font-size="15" font-weight="900" text-anchor="middle" fill="#106020">西瓜汽水</text></svg>`,
  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><circle cx="100" cy="100" r="96" fill="#f0eaff" stroke="#c060d0" stroke-width="4"/><defs><linearGradient id="tg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff70b8"/><stop offset="40%" stop-color="#ff9830"/><stop offset="100%" stop-color="#40d0a8"/></linearGradient></defs><polygon points="100,28 148,148 52,148" fill="url(#tg)"/><rect x="88" y="148" width="24" height="32" rx="5" fill="#d040a0"/><rect x="72" y="176" width="56" height="12" rx="6" fill="#b82888"/><rect x="95" y="12" width="8" height="20" rx="4" fill="#ff3878"/><circle cx="100" cy="12" r="9" fill="#ff3878"/><circle cx="97" cy="9" r="4" fill="#fff" opacity=".6"/><text x="100" y="194" font-family="Arial" font-size="11.5" font-weight="900" text-anchor="middle" fill="#802060">熱帶雞尾酒</text></svg>`,
  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><circle cx="100" cy="100" r="96" fill="#fffbe0" stroke="#d8a800" stroke-width="5"/><defs><radialGradient id="legend" cx="38%" cy="32%" r="70%"><stop offset="0%" stop-color="#fff8c0"/><stop offset="45%" stop-color="#f0c000"/><stop offset="100%" stop-color="#b07800"/></radialGradient></defs><circle cx="100" cy="100" r="74" fill="url(#legend)"/><circle cx="100" cy="100" r="74" fill="none" stroke="#d8a800" stroke-width="4.5"/><ellipse cx="78" cy="76" rx="16" ry="9" fill="#fff" opacity=".22" transform="rotate(-30 78 76)"/><text x="100" y="116" font-family="Arial" font-size="58" font-weight="900" text-anchor="middle" fill="#7a4a00" opacity=".85">★</text><text x="100" y="180" font-family="Arial" font-size="13.5" font-weight="900" text-anchor="middle" fill="#7a4a00">傳說特調</text></svg>`
];

function svgToURL(s) { return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(s); }
const FALLBACK = DRINK_SVG.map(svgToURL);

/* ── Image preload ── */
const resolvedImages = new Array(ITEMS.length);
let loadedCount = 0;
function preloadImages(cb) {
  ITEMS.forEach((item, i) => {
    const img = new Image();
    img.onload  = () => { resolvedImages[i] = item.image; done(); };
    img.onerror = () => { resolvedImages[i] = FALLBACK[i]; done(); };
    img.src = item.image;
    function done() { if (++loadedCount === ITEMS.length) cb(); }
  });
}

/* ── Matter.js ── */
const { Engine, Render, Runner, Bodies, Composite, Events, Vector, Body } = Matter;

const canvas     = document.getElementById('game');
const boardShell = document.getElementById('boardShell');
const scoreEl    = document.getElementById('score');
const bestEl     = document.getElementById('best');
const mergesEl   = document.getElementById('merges');
const maxlvEl    = document.getElementById('maxlevel');
const nextImg    = document.getElementById('nextImg');
const nextName   = document.getElementById('nextName');
const launcherToken = document.getElementById('launcherToken');
const launcherImg   = document.getElementById('launcherImg');
const shootGuide    = document.getElementById('shootGuide');
const overlay    = document.getElementById('gameOverOverlay');
const finalScEl  = document.getElementById('finalScore');
const finalBsEl  = document.getElementById('finalBest');
const itemListEl = document.getElementById('itemList');

const W = canvas.width, H = canvas.height;
const WALL_T = 40;
const LAUNCH_Y = H - 40;      // where balls are launched FROM (bottom)
const GAME_OVER_Y = 80;       // overflow line near top
const CUP_L = 44, CUP_R = 44, CUP_BOT = 24, CUP_TOP_VIS = 64;
const OVERFLOW_DELAY = 1400;
// Upward launch speed (pixels/second in Matter units)
const LAUNCH_SPEED = 18;

let engine, render, runner;
let score=0, best=0, merges=0, maxLevel=0;
let currentX=W/2, nextLevel=0;
let canDrop=true, isGameOver=false;
let overflowStart=null, comboCount=0, comboTimer=null;

function rand() { return Math.floor(Math.random() * Math.min(3, ITEMS.length)); }

function updateStats() {
  scoreEl.textContent  = score;
  bestEl.textContent   = best;
  mergesEl.textContent = merges;
  maxlvEl.textContent  = maxLevel + 1;
}

function setNext(lv) {
  const src = resolvedImages[lv];
  nextImg.src = src; nextName.textContent = ITEMS[lv].name;
  launcherImg.src = src;
  const sz = Math.max(44, Math.min(84, ITEMS[lv].radius * 2));
  launcherToken.style.width  = sz + 'px';
  launcherToken.style.height = sz + 'px';
}

function clampX(x, lv) {
  const r = ITEMS[lv].radius;
  return Math.max(CUP_L + r + 3, Math.min(W - CUP_R - r - 3, x));
}

function updateLauncher() {
  const canvasRect = canvas.getBoundingClientRect();
  const shellRect  = boardShell.getBoundingClientRect();
  const canvasOffsetLeft = canvasRect.left - shellRect.left;
  const vx = canvasOffsetLeft + (currentX / W) * canvasRect.width;
  launcherToken.style.left = vx + 'px';
  shootGuide.style.left    = vx + 'px';
}

function scorePop(x, y, pts, combo) {
  const canvasRect = canvas.getBoundingClientRect();
  const shellRect  = boardShell.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'score-pop';
  el.style.left = (canvasRect.left - shellRect.left + (x / W) * canvasRect.width) + 'px';
  el.style.top  = ((y / H) * canvasRect.height) + 'px';
  el.textContent = (combo ? '🔥×'+comboCount+' ' : '') + '+' + pts;
  if (combo) { el.style.color = '#f7a200'; el.style.fontSize = '21px'; }
  boardShell.appendChild(el);
  setTimeout(() => el.remove(), 950);
}

function showCombo(n) {
  boardShell.querySelector('.combo-badge')?.remove();
  if (n < 2) return;
  const el = document.createElement('div');
  el.className = 'combo-badge';
  el.textContent = '🔥 ' + n + ' 連鎖合併！';
  boardShell.appendChild(el);
  if (comboTimer) clearTimeout(comboTimer);
  comboTimer = setTimeout(() => el.remove(), 1600);
}

/* ── Shoot animation: launch ball upward with an arc projectile visual ── */
function spawnShootEffect(x, lv) {
  const item = ITEMS[lv];
  const sz = item.radius * 2;
  const el = document.createElement('div');
  el.style.cssText = `
    position:absolute;
    left:${(x/W*100)}%;
    bottom:${(28/H*100 + (item.radius/H*100))}%;
    width:${sz}px; height:${sz}px;
    transform:translateX(-50%);
    border-radius:50%; overflow:hidden;
    pointer-events:none; z-index:5;
    box-shadow:0 0 16px rgba(232,82,122,0.6),0 0 32px rgba(232,82,122,0.3);
    transition: bottom 0.28s cubic-bezier(0.4,0,0.6,1), opacity 0.06s 0.22s;
  `;
  const img = document.createElement('img');
  img.src = resolvedImages[lv];
  img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
  el.appendChild(img);
  boardShell.appendChild(el);
  requestAnimationFrame(() => {
    el.style.bottom = '100%';
    el.style.opacity = '0';
  });
  setTimeout(() => el.remove(), 400);
}

function makeBall(x, y, lv) {
  const item = ITEMS[lv];
  const body = Bodies.circle(x, y, item.radius, {
    restitution: 0.18, friction: 0.05, frictionAir: 0.012, density: 0.0015,
    render: { sprite: {
      texture: resolvedImages[lv],
      xScale: (item.radius * 2) / 200,
      yScale: (item.radius * 2) / 200
    }}
  });
  body.level = lv; body.isMergeBall = true; body.hasMerged = false;
  return body;
}

function buildList() {
  itemListEl.innerHTML = '';
  ITEMS.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML =
      `<div class="item-dot"><img src="${resolvedImages[i]}" alt="${item.name}" loading="lazy" width="30" height="30"></div>`+
      `<div class="item-name">${item.name}</div>`+
      `<div class="item-badge">+${item.score}</div>`;
    itemListEl.appendChild(row);
  });
}

function drawDecos() {
  const ctx = render.context;
  ctx.save();

  /* ── 3-D cup body: gradient fill ── */
  const grad = ctx.createLinearGradient(CUP_L, 0, W - CUP_R, 0);
  grad.addColorStop(0,    'rgba(255,220,240,0.18)');
  grad.addColorStop(0.5,  'rgba(255,245,252,0.08)');
  grad.addColorStop(1,    'rgba(255,220,240,0.18)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(CUP_L, CUP_TOP_VIS);
  ctx.lineTo(CUP_L, H - CUP_BOT);
  ctx.lineTo(W - CUP_R, H - CUP_BOT);
  ctx.lineTo(W - CUP_R, CUP_TOP_VIS);
  ctx.closePath();
  ctx.fill();

  /* ── Left wall 3-D highlight ── */
  const lGrad = ctx.createLinearGradient(CUP_L, 0, CUP_L + 14, 0);
  lGrad.addColorStop(0,   'rgba(255,255,255,0.55)');
  lGrad.addColorStop(1,   'rgba(255,255,255,0)');
  ctx.fillStyle = lGrad;
  ctx.fillRect(CUP_L, CUP_TOP_VIS, 14, H - CUP_TOP_VIS - CUP_BOT);

  /* ── Right wall 3-D shadow ── */
  const rGrad = ctx.createLinearGradient(W - CUP_R - 14, 0, W - CUP_R, 0);
  rGrad.addColorStop(0,   'rgba(180,60,110,0)');
  rGrad.addColorStop(1,   'rgba(180,60,110,0.18)');
  ctx.fillStyle = rGrad;
  ctx.fillRect(W - CUP_R - 14, CUP_TOP_VIS, 14, H - CUP_TOP_VIS - CUP_BOT);

  /* ── Bottom 3-D ellipse ── */
  ctx.fillStyle = 'rgba(220,170,200,0.30)';
  ctx.beginPath();
  ctx.ellipse(W / 2, H - CUP_BOT, (W - CUP_L - CUP_R) / 2, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  /* ── Cup rim top ellipse ── */
  ctx.strokeStyle = 'rgba(232,82,122,0.22)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(W / 2, CUP_TOP_VIS, (W - CUP_L - CUP_R) / 2, 10, 0, 0, Math.PI * 2);
  ctx.stroke();

  /* ── Cup walls outline ── */
  ctx.strokeStyle = 'rgba(232,82,122,0.32)'; ctx.lineWidth = 3.5; ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(CUP_L, CUP_TOP_VIS); ctx.lineTo(CUP_L, H - CUP_BOT);
  ctx.lineTo(W - CUP_R, H - CUP_BOT); ctx.lineTo(W - CUP_R, CUP_TOP_VIS);
  ctx.stroke();

  /* ── Overflow dashed line ── */
  ctx.strokeStyle = 'rgba(240,100,50,0.70)'; ctx.lineWidth = 2; ctx.setLineDash([9, 7]);
  ctx.beginPath(); ctx.moveTo(CUP_L + 16, GAME_OVER_Y); ctx.lineTo(W - CUP_R - 16, GAME_OVER_Y); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(240,100,50,0.85)'; ctx.font = 'bold 10.5px Nunito,Arial,sans-serif';
  ctx.fillText('▲ 爆杯警戒線', W - 148, GAME_OVER_Y - 7);

  /* ── Launcher platform at bottom ── */
  const platGrad = ctx.createLinearGradient(0, H - 60, 0, H - 20);
  platGrad.addColorStop(0, 'rgba(232,82,122,0.22)');
  platGrad.addColorStop(1, 'rgba(232,82,122,0.05)');
  ctx.fillStyle = platGrad;
  ctx.beginPath();
  ctx.roundRect
    ? ctx.roundRect(CUP_L + 4, H - 58, W - CUP_L - CUP_R - 8, 36, 10)
    : ctx.rect(CUP_L + 4, H - 58, W - CUP_L - CUP_R - 8, 36);
  ctx.fill();
  ctx.strokeStyle = 'rgba(232,82,122,0.35)'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect
    ? ctx.roundRect(CUP_L + 4, H - 58, W - CUP_L - CUP_R - 8, 36, 10)
    : ctx.rect(CUP_L + 4, H - 58, W - CUP_L - CUP_R - 8, 36);
  ctx.stroke();

  /* ── Launcher label ── */
  ctx.fillStyle = 'rgba(232,82,122,0.75)'; ctx.font = 'bold 9.5px Nunito,Arial,sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🚀 LAUNCHER', W / 2, H - 8);
  ctx.textAlign = 'left';

  ctx.restore();
}

function createWorld() {
  engine = Engine.create(); engine.gravity.y = 1.1;
  render = Render.create({ canvas, engine, options:{ width:W, height:H, wireframes:false, background:'transparent' } });

  // Floor hidden below launcher platform
  const floor = Bodies.rectangle(W/2, H - CUP_BOT/2 + WALL_T/2, W - 56, WALL_T, { isStatic:true, render:{fillStyle:'rgba(220,180,200,0.0)'} });
  const lw    = Bodies.rectangle(CUP_L/2, H/2, WALL_T, H, { isStatic:true, render:{fillStyle:'rgba(220,180,200,0.0)'} });
  const rw    = Bodies.rectangle(W-CUP_R/2, H/2, WALL_T, H, { isStatic:true, render:{fillStyle:'rgba(220,180,200,0.0)'} });
  Composite.add(engine.world, [floor, lw, rw]);
  Render.run(render); runner = Runner.create(); Runner.run(runner, engine);
  Events.on(engine, 'collisionStart', onCollision);
  Events.on(engine, 'beforeUpdate',   checkOverflow);
  Events.on(render,  'afterRender',   drawDecos);
}

function shootBall() {
  if (!canDrop || isGameOver) return;
  const lv = nextLevel;
  const cx = clampX(currentX, lv);

  // Visual shoot effect
  spawnShootEffect(cx, lv);

  // Create body at launch position
  const ball = makeBall(cx, LAUNCH_Y - ITEMS[lv].radius - 2, lv);
  Composite.add(engine.world, ball);
  // Give it upward velocity
  Body.setVelocity(ball, { x: 0, y: -LAUNCH_SPEED });

  canDrop = false; comboCount = 0;
  nextLevel = rand(); setNext(nextLevel);
  currentX = clampX(currentX, nextLevel); updateLauncher();
  setTimeout(() => { canDrop = true; }, 320);
}

function onCollision(ev) {
  for (const p of ev.pairs) {
    const a=p.bodyA, b=p.bodyB;
    if (!a.isMergeBall||!b.isMergeBall) continue;
    if (a.level!==b.level||a.hasMerged||b.hasMerged) continue;
    const next=a.level+1; if (!ITEMS[next]) continue;
    a.hasMerged=true; b.hasMerged=true;
    const pos=Vector.create((a.position.x+b.position.x)/2,(a.position.y+b.position.y)/2);
    const pts=ITEMS[next].score, lv=next;
    setTimeout(()=>{
      Composite.remove(engine.world,a); Composite.remove(engine.world,b);
      Composite.add(engine.world, makeBall(pos.x,pos.y,lv));
      comboCount++; merges++;
      if (lv>maxLevel) maxLevel=lv;
      score += pts + (comboCount>1 ? pts*(comboCount-1) : 0);
      if (score>best) best=score;
      updateStats();
      scorePop(pos.x,pos.y,pts,comboCount>1);
      showCombo(comboCount);
    },22);
  }
}

function checkOverflow() {
  if (isGameOver) return;
  const over = Composite.allBodies(engine.world).some(b=>
    b.isMergeBall && b.position.y - ITEMS[b.level].radius < GAME_OVER_Y
  );
  if (over) {
    if (!overflowStart) overflowStart=performance.now();
    if (performance.now()-overflowStart>OVERFLOW_DELAY) {
      isGameOver=true; canDrop=false;
      overlay.classList.add('show');
      finalScEl.textContent=score;
      finalBsEl.textContent=score>=best?'🏆 新紀錄！':'最高分：'+best;
    }
  } else { overflowStart=null; }
}

function getCanvasX(clientX) {
  const r = canvas.getBoundingClientRect();
  return clampX(((clientX - r.left) / r.width) * W, nextLevel);
}

function bindInput() {
  canvas.addEventListener('mousemove', e => {
    if (isGameOver) return;
    currentX = getCanvasX(e.clientX);
    updateLauncher();
  });
  canvas.addEventListener('click', () => shootBall());

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (isGameOver) return;
    currentX = getCanvasX(e.touches[0].clientX);
    updateLauncher();
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (isGameOver) return;
    currentX = getCanvasX(e.touches[0].clientX);
    updateLauncher();
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (isGameOver) return;
    if (e.changedTouches.length > 0) {
      currentX = getCanvasX(e.changedTouches[0].clientX);
      updateLauncher();
    }
    shootBall();
  }, { passive: false });

  window.addEventListener('resize', updateLauncher);
}

function destroyWorld() {
  if (render) {
    Events.off(render,'afterRender',drawDecos); Render.stop(render);
    render.canvas.getContext('2d').clearRect(0,0,W,H); render.textures={};
  }
  if (runner) Runner.stop(runner);
  if (engine) {
    Events.off(engine,'collisionStart',onCollision);
    Events.off(engine,'beforeUpdate',checkOverflow);
    Composite.clear(engine.world,false); Engine.clear(engine);
  }
}

function startGame() {
  destroyWorld(); overlay.classList.remove('show');
  score=0; merges=0; maxLevel=0;
  isGameOver=false; canDrop=true; overflowStart=null; comboCount=0;
  nextLevel=rand(); currentX=clampX(W/2,nextLevel);
  setNext(nextLevel); updateStats(); createWorld(); updateLauncher();
}

document.getElementById('restartBtn').addEventListener('click', startGame);
document.getElementById('restartBtn2').addEventListener('click', startGame);
bindInput();
preloadImages(() => { buildList(); startGame(); });
</script>
